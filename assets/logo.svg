<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Mountains -->
  <g fill="#1a1a1a">
    <!-- Back mountain (largest, center) -->
    <polygon points="300,60 450,220 150,220" fill="#3a3a3a"/>
    <!-- Snow cap back mountain -->
    <polygon points="300,60 330,100 270,100" fill="#e8e8e8"/>

    <!-- Left mountain -->
    <polygon points="180,100 320,220 40,220" fill="#2a2a2a"/>
    <!-- Snow cap left -->
    <polygon points="180,100 200,130 160,130" fill="#e8e8e8"/>

    <!-- Right mountain -->
    <polygon points="420,110 560,220 280,220" fill="#4a4a4a"/>
    <!-- Snow cap right -->
    <polygon points="420,110 440,138 400,138" fill="#e8e8e8"/>
  </g>

  <!-- Left Excavator on left mountain -->
  <g stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cab body -->
    <rect x="120" y="138" width="32" height="22" rx="3" fill="#1a1a1a"/>
    <!-- Track base -->
    <rect x="112" y="160" width="48" height="10" rx="5" fill="#1a1a1a"/>
    <!-- Boom arm going up-left -->
    <line x1="125" y1="142" x2="88" y2="108"/>
    <!-- Stick -->
    <line x1="88" y1="108" x2="68" y2="130"/>
    <!-- Bucket -->
    <polyline points="68,130 58,128 55,138 68,140" stroke-width="3"/>
  </g>

  <!-- Right Excavator on right mountain -->
  <g stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cab body -->
    <rect x="448" y="148" width="32" height="22" rx="3" fill="#1a1a1a"/>
    <!-- Track base -->
    <rect x="440" y="170" width="48" height="10" rx="5" fill="#1a1a1a"/>
    <!-- Boom arm going up-right -->
    <line x1="475" y1="152" x2="512" y2="118"/>
    <!-- Stick -->
    <line x1="512" y1="118" x2="532" y2="140"/>
    <!-- Bucket -->
    <polyline points="532,140 542,138 545,148 532,150" stroke-width="3"/>
  </g>

  <!-- Ground line / base -->
  <path d="M30,220 Q100,215 200,220 Q300,225 400,220 Q500,215 570,220" stroke="#1a1a1a" stroke-width="2" fill="none"/>

  <!-- Company Name -->
  <text x="300" y="270" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BLACK MOUNTAIN</text>
  <text x="300" y="320" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#1a1a1a" letter-spacing="4">DIRT WORKS</text>

  <!-- Tagline -->
  <text x="300" y="355" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" letter-spacing="6" text-transform="uppercase">EXCAVATION &amp; SITEWORK</text>
</svg>
